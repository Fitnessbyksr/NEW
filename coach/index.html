<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KSR Coach">
  <meta name="theme-color" content="#1A2340">
  <title>KSR Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>

<div id="app">
  <header class="topbar">
    <h1 class="topbar-title" id="page-title">Dashboard</h1>
    <button class="btn-add" id="btn-add" aria-label="Add new" style="display:none">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <main class="content" id="content"></main>

  <nav class="bottom-nav" role="navigation" aria-label="App navigation">
    <button class="nav-item active" data-view="dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-view="clients">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Clients</span>
    </button>
    <button class="nav-item" data-view="plans">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Plans</span>
    </button>
    <button class="nav-item" data-view="exercises">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <path d="M6.5 4v16M17.5 4v16M6.5 12h11M4 7.5h2.5M17.5 7.5H20M4 16.5h2.5M17.5 16.5H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Exercises</span>
    </button>
    <button class="nav-item" data-view="stretches">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="4.5" r="1.5" stroke="currentColor" stroke-width="1.8"/>
        <path d="M12 6.5v5M12 11.5l-3.5 5M12 11.5l3.5 5M7 9.5h3M14 9.5h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Stretches</span>
    </button>
    <button class="nav-item" data-view="notes">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <path d="M14 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M14 3l4 4M14 3v4h4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M8 13h8M8 17h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Notes</span>
    </button>
  </nav>
</div>

<!-- Bottom sheet -->
<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 class="sheet-title" id="sheet-title"></h2>
    <button class="sheet-close" id="sheet-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 3l12 12M15 3L3 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- Confirm delete dialog -->
<div class="modal-overlay" id="confirm-overlay"></div>
<div class="confirm-modal" id="confirm-modal">
  <p class="confirm-text" id="confirm-text">Are you sure?</p>
  <div class="confirm-actions">
    <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
    <button class="btn btn-danger" id="confirm-ok">Delete</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
